<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Vision</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-sky id="fondo" color="#222222"></a-sky>
      
      <a-plane id="btn-casa1" position="-1.5 2.2 -3" color="#4CC3D9" width="2" height="0.6">
        <a-text value="Casa de Campo" align="center" color="#000000" position="0 0 0.1"></a-text>
      </a-plane>

      <a-plane id="btn-casa2" position="1.5 2.2 -3" color="#EF2D5E" width="2" height="0.6">
        <a-text value="Casa de Playa" align="center" color="#FFFFFF" position="0 0 0.1"></a-text>
      </a-plane>

      <a-plane id="btn-casa3" position="-1.5 1.2 -3" color="#FFC65C" width="2" height="0.6">
        <a-text value="Depa Cocina" align="center" color="#000000" position="0 0 0.1"></a-text>
      </a-plane>

      <a-plane id="btn-casa4" position="1.5 1.2 -3" color="#7BC8A4" width="2" height="0.6">
        <a-text value="Casa Moderna" align="center" color="#000000" position="0 0 0.1"></a-text>
      </a-plane>

      <a-plane id="btn-casa5" position="0 0.2 -3" color="#9B59B6" width="2" height="0.6">
        <a-text value="Penthouse" align="center" color="#FFFFFF" position="0 0 0.1"></a-text>
      </a-plane>

      <a-plane id="btn-volver" position="0 0.1 -1.5" rotation="-90 0 0" color="#333333" width="2" height="0.6" visible="false">
        <a-text value="Volver al Lobby" align="center" color="#FFFFFF" position="0 0 0.1"></a-text>
      </a-plane>

      <a-camera>
        <a-cursor color="#FFFFFF" fuse="true" fuse-timeout="2000"></a-cursor>
      </a-camera>
    </a-scene>

    <script>
      const fondo = document.querySelector('#fondo');
      const btnVolver = document.querySelector('#btn-volver');
      
      const botones = [
        document.querySelector('#btn-casa1'),
        document.querySelector('#btn-casa2'),
        document.querySelector('#btn-casa3'),
        document.querySelector('#btn-casa4'),
        document.querySelector('#btn-casa5')
      ];

      const imagenes = ['casa1.jpg', 'casa2.jpg', 'casa3.jpg', 'casa4.jpg', 'casa5.jpg'];


      function entrarACasa(imagenSrc) {
        fondo.removeAttribute('color');
        fondo.setAttribute('src', imagenSrc);
        
        botones.forEach(boton => boton.setAttribute('visible', 'false'));
        
        btnVolver.setAttribute('visible', 'true');
      }

      botones.forEach((boton, index) => {
        boton.addEventListener('click', function() {
          entrarACasa(imagenes[index]);
        });
      });

      btnVolver.addEventListener('click', function() {
        fondo.removeAttribute('src');
        fondo.setAttribute('color', '#222222');
        
        botones.forEach(boton => boton.setAttribute('visible', 'true'));
        
        btnVolver.setAttribute('visible', 'false');
      });
    </script>
  </body>
</html>
