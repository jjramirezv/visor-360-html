<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Mi Visor 360°</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-sky id="fondo" src="sala-360-2.jpg"></a-sky>

      <a-box id="boton-cocina" position="0 1.5 -3" color="#EF2D5E" depth="0.5" height="0.5" width="0.5"></a-box>

      <a-camera>
        <a-cursor color="#4CC3D9" fuse="true" fuse-timeout="2000"></a-cursor>
      </a-camera>
    </a-scene>
    <script>
      const botonCocina = document.querySelector('#boton-cocina');
      const fondo = document.querySelector('#fondo');

      botonCocina.addEventListener('click', function() {
        fondo.setAttribute('src', 'cocina.jpg');
      });
    </script>
  </body>
</html>
